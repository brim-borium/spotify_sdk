name: spotify_sdk_monorepo
description: Root workspace for spotify_sdk monorepo
publish_to: 'none'

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

workspace:
  - packages/spotify_sdk
  - packages/spotify_sdk_platform_interface
  - packages/spotify_sdk_android
  - packages/spotify_sdk_ios
  - packages/spotify_sdk_web
  - example

dev_dependencies:
  melos: ^8.2.2
  very_good_analysis: ^10.3.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true
    version:
      ignore:
        - "spotify_sdk_example"
  scripts:
    analyze:
      run: melos exec -- flutter analyze
      description: Analyze all Dart code in the monorepo.

    format:
      run: melos exec -- dart format . --set-exit-if-changed
      description: Ensure all packages match standard formatting.

    test:all:
      run: melos exec --dir-exists="test" -- flutter test
      description: Run all package tests.

    generate:all:
      run: melos exec --depends-on="build_runner" -- flutter pub run build_runner build --delete-conflicting-outputs
      description: Run build_runner code generation across all packages.

    version:
      run: melos version
      description: Automatically bump versions and generate changelogs using Conventional Commits.

    publish:dry-run:
      run: melos publish --dry-run --yes
      description: Run dry-run package publishing check across all packages in the workspace.
