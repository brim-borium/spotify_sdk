name: spotify_sdk
on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # Match the fvm-pinned Flutter version (.fvmrc) so CI uses the same
          # toolchain as local dev and satisfies the Dart >=3.12 constraint.
          flutter-version-file: .fvmrc
      - name: Install Dependencies
        run: flutter packages get
      - name: Format
        run: dart format --set-exit-if-changed bin lib test example
      - name: Analyze
        run: flutter analyze lib test example --no-fatal-infos
      - name: Test
        run: flutter test
      - name: Publish dry run
        run: flutter pub publish --dry-run
      - name: Build web version
        run: |
              cd example
              flutter build web

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
      - name: Install Dependencies
        working-directory: example
        run: flutter pub get
      # The example bundles the Spotify App Remote AAR under
      # example/android/spotify-app-remote/, so no android_setup step is needed.
      - name: Build Android example
        working-directory: example
        run: flutter build apk --debug

  pana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc

      - name: Install Dependencies
        run: |
          flutter packages get
          flutter pub global activate pana
          sudo apt-get install webp

      - name: Verify Pub Score
        run: ./.github/scripts/verify_pub_score.sh
