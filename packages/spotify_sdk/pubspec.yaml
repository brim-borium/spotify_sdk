name: spotify_sdk
description: A flutter plugin that let's you communicate with the spotify sdk and auth lib
version: 4.0.0
homepage: https://github.com/brim-borium/spotify_sdk
publish_to: 'none'
issue_tracker: https://github.com/brim-borium/spotify_sdk/issues
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  logger: ^2.7.0
  spotify_sdk_android:
    path: ../spotify_sdk_android
  spotify_sdk_ios:
    path: ../spotify_sdk_ios
  spotify_sdk_platform_interface:
    path: ../spotify_sdk_platform_interface
  spotify_sdk_web:
    path: ../spotify_sdk_web

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  plugin:
    platforms:
      android:
        default_package: spotify_sdk_android
      ios:
        default_package: spotify_sdk_ios
      web:
        default_package: spotify_sdk_web
